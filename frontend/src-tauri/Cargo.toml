[package]
name = "raplmail"
version = "0.1.0"
description = "RaplMail desktop shell"
authors = ["RaplMail"]
edition = "2021"

[[bin]]
name = "raplmail"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = "0.8"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
